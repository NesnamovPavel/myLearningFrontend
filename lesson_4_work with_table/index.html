<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arbeiten mit Tabellen</title>
    <link href="minimal-table.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Bauen unsere erste Tabelle auf</h1>
    <table>
      <tr>
        <th>Die erste Zelle</th>
        <th>Die zweite Zelle</th>
        <th>Die dritte Zelle</th>
      </tr>
      <tr>
        <td colspan="2">Die erste Zelle</td>
        <!-- <td>Die zweite Zelle</td> -->
        <td rowspan="2">Die dritte Zelle</td>
      </tr>
      <tr>
        <td>Die erste Zelle</td>
        <td>Die zweite Zelle</td>
        <!-- <td>Die dritte Zelle</td> -->
      </tr>
    </table>
  </body>
</html>
